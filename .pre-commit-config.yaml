repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mamushi
        name: mamushi
        entry: mamushi
        language: system
        types_or: [file]
        files: \.vyi?$

      - id: mypy
        name: mypy
        entry: mypy tests
        language: system
        pass_filenames: false
        files: \.py$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
